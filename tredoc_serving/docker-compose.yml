services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tredoc
      POSTGRES_PASSWORD: tredoc
      POSTGRES_DB: tredoc
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./app/artifacts/model:/model
    command: >
      --model /model
      --served-model-name tredoc
      --host 0.0.0.0
      --port 8000
    ports:
      - "8100:8000"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://tredoc:tredoc@db:5432/tredoc
      VLLM_BASE_URL: http://vllm:8000/v1
    depends_on:
      - db
      - vllm

volumes:
  pgdata:
